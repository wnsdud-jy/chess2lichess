name: release-binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            exe_suffix: ""
          - os: macos-13
            platform: darwin
            arch: x64
            exe_suffix: ""
          - os: macos-14
            platform: darwin
            arch: arm64
            exe_suffix: ""
          - os: windows-latest
            platform: win32
            arch: x64
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build release binary
        run: cargo build --release

      - name: Verify Cargo and npm versions match
        shell: bash
        run: |
          set -euo pipefail
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          npm_version=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")
          test "$cargo_version" = "$npm_version"

      - name: Package binary asset
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ASSET_NAME="c2l-${TAG}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.exe_suffix }}"
          SOURCE_BIN="target/release/c2l${{ matrix.exe_suffix }}"

          cp "$SOURCE_BIN" "$ASSET_NAME"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_ENV"
          ls -l "$ASSET_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: ${{ env.asset_name }}
          if-no-files-found: error

  release:
    name: publish-release-assets
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums file
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CHECKSUM_FILE="c2l-${TAG}-checksums.txt"

          cd dist
          : > "$CHECKSUM_FILE"

          shopt -s nullglob
          asset_count=0
          for file in c2l-${TAG}-*; do
            if [ "$file" = "$CHECKSUM_FILE" ]; then
              continue
            fi
            sha256sum "$file" >> "$CHECKSUM_FILE"
            asset_count=$((asset_count + 1))
          done

          if [ "$asset_count" -eq 0 ]; then
            echo "No release assets found for checksum generation."
            exit 1
          fi

          cat "$CHECKSUM_FILE"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/c2l-${{ github.ref_name }}-*
          fail_on_unmatched_files: true
          generate_release_notes: true
